name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Opt into Node.js 24 for actions/checkout, actions/setup-python, etc.
  # GitHub is deprecating Node 20 by September 2026; opting in early
  # silences the deprecation warning and ensures forward compatibility.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[starlette,dev]"

      - name: Run tests
        run: pytest -v
